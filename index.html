        const KANBAN_COLS = ['Recebida', 'Check List', 'Cadastro', 'Assinatura', 'Em Análise', 'Pendência', 'Aguardando Implantação', 'Implantada'];

        const copyToClipboard = (text, setCopiedId, id) => {
            // Usa execCommand como fallback em iframes ou caso API moderna falhe
            const fallbackCopy = (textToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                textArea.remove();
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        setCopiedId(id);
                        setTimeout(() => setCopiedId(null), 2000);
                    })
                    .catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        };

        const FlowStep = ({ step, index, total }) => (
            <div className="relative flex items-start gap-6 mb-8 group">
                <div className="flex flex-col items-center">
                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-lg shadow-md z-10 transition-colors
                        ${step.highlight ? 'bg-black text-white shadow-gray-400' : 'bg-purple-600 text-white shadow-purple-200'}`}>
                        {index + 1}
                    </div>
                    {index < total - 1 && (
                        <div className="w-1 h-full bg-gray-200 absolute top-12 bottom-[-2rem] group-hover:bg-purple-300 transition-colors"></div>
                    )}
                </div>
                <div className={`flex-1 bg-white p-6 rounded-2xl shadow-sm border ${step.highlight ? 'border-gray-800' : 'border-gray-100'} hover:shadow-md transition-shadow`}>
                    <div className="flex justify-between items-start mb-2">
                        <h3 className="text-xl font-bold text-gray-800">{step.title}</h3>
                        <span className={`flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold 
                            ${step.highlight ? 'bg-gray-200 text-black' : 'bg-purple-100 text-purple-800'}`}>
                            <i className="ph ph-clock text-[14px]"></i>

                        </span>
                    </div>
                    <p className="text-gray-600 leading-relaxed">{step.desc}</p>

        );

        const CoverScreen = ({ onStart }) => (
            <div className="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-gray-900 via-black to-purple-900 p-6 text-center w-full h-full absolute inset-0 z-50">
                <div className="bg-white/10 backdrop-blur-md p-10 rounded-3xl shadow-2xl max-w-3xl border border-white/20 animate-fade-in-up">
                    <div className="bg-white text-purple-800 w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-lg">
                        <i className="ph ph-activity text-[40px]"></i>
                    </div>
                    <h1 className="text-5xl md:text-6xl font-extrabold text-white mb-4 tracking-tight">

                    </h1>
                    <h2 className="text-2xl md:text-3xl text-purple-300 font-medium mb-8">

                    </h2>
                    <p className="text-lg text-purple-100 mb-12 max-w-2xl mx-auto leading-relaxed">

                    </p>
                    <button

        const MenuScreen = ({ setScreen }) => (

                <h2 className="text-3xl font-bold text-gray-800 mb-2">Visão Geral</h2>
                <p className="text-gray-500 mb-8">Selecione um dos módulos abaixo para acessar as diretrizes operacionais.</p>
                
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {MENU_ITEMS.slice(1).map((item) => (
                        <button
                            key={item.id}

        const FlowTemplate = ({ title, icon, flowData }) => (
            <div className="max-w-4xl mx-auto animate-fade-in">
                <div className="flex items-center gap-4 mb-8 pb-6 border-b border-gray-200">

                    </div>
                    <div>

                    </div>
                </div>
                <div className="pl-4 py-4">
                    {flowData.map((step, idx) => (
                        <FlowStep key={idx} step={step} index={idx} total={flowData.length} />
                    ))}

            </div>
        );

        const ChecklistScreen = () => {
            const [activeTab, setActiveTab] = useState('PME');
            
            const WarningCard = () => (
                <div className="mt-8 bg-rose-50 border-l-4 border-red-500 p-6 rounded-r-xl flex items-start gap-4">
                    <i className="ph ph-warning-circle text-[24px] text-red-500 mt-1 flex-shrink-0"></i>
                    <div>
                        <h4 className="text-red-800 font-bold text-lg mb-1">ATENÇÃO</h4>
                        <p className="text-red-700">Sempre solicitar a <strong>Carta de Permanência</strong> quando o cliente possuir plano anterior. Item obrigatório para aproveitamento de carências.</p>
                    </div>
                </div>
            );

            const CheckItem = ({ label }) => {
                const [isChecked, setIsChecked] = useState(false);
                
                return (
                    <label className={`flex items-center p-4 border rounded-xl cursor-pointer transition-colors group ${isChecked ? 'bg-purple-50 border-purple-200' : 'border-gray-100 hover:bg-gray-50'}`}>
                        <input 
                            type="checkbox" 
                            className="hidden" 
                            checked={isChecked}

                        />

                            <i className={`ph ph-check text-[16px] ${isChecked ? 'text-white' : 'text-transparent group-hover:text-purple-500'}`}></i>
                        </div>
                        <span className={`font-medium transition-colors ${isChecked ? 'text-purple-800' : 'text-gray-700'}`}>

            return (

                    <div className="flex space-x-2 mb-8 bg-gray-100 p-1.5 rounded-2xl w-fit">

                                        <CheckItem label="Cartão CNPJ" />

                                </div>

                                        <CheckItem label="Telefone" />
                                    </div>
                                </div>
                                <div>
                                    <h3 className="text-xl font-bold text-purple-800 mb-4 flex items-center gap-2">

                                        <CheckItem label="Certidão de Casamento" />
                                    </div>
                                </div>

                        {activeTab === 'Adesão' && (

                                        <CheckItem label="Comprovante de residência" />

                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const KanbanScreen = ({ cards, setCards }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [draggedCardId, setDraggedCardId] = useState(null);
            const [editingCard, setEditingCard] = useState(null);

            const handleDragStart = (e, id) => {
                setDraggedCardId(id);
                e.dataTransfer.effectAllowed = "move";
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = (e, newStatus) => {
                e.preventDefault();
                if (draggedCardId !== null) {
                    setCards(prevCards => 
                        prevCards.map(card => 
                            card.id === draggedCardId ? { ...card, status: newStatus } : card
                        )
                    );
                    setDraggedCardId(null);
                }
            };

            const handleDeleteCard = (id) => {
                setCards(prevCards => prevCards.filter(card => card.id !== id));
            };

            const handleEditClick = (card) => {
                setEditingCard(card);
                setIsModalOpen(true);
            };

            const handleSaveCard = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const cardData = {
                    name: formData.get('name'),
                    op: formData.get('op'),
                    type: formData.get('type'),
                    resp: formData.get('resp'),
                };

                if (editingCard) {
                    setCards(prevCards => prevCards.map(card => 
                        card.id === editingCard.id ? { ...card, ...cardData } : card
                    ));
                } else {
                    const newCard = {
                        id: Date.now(),
                        ...cardData,
                        date: new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
                        sla: 'green',
                        status: 'Recebida'
                    };
                    setCards([...cards, newCard]);
                }
                
                setIsModalOpen(false);
                setEditingCard(null);
            };

            const getSlaColor = (color) => {
                switch(color) {
                    case 'green': return 'bg-emerald-500';
                    case 'yellow': return 'bg-amber-400';
                    case 'red': return 'bg-rose-500';
                    default: return 'bg-gray-400';
                }
            };

            return (
                <div className="h-[80vh] flex flex-col animate-fade-in relative">
                    <div className="mb-6 flex justify-between items-end">
                        <div>
                            <h2 className="text-3xl font-bold text-gray-800">Controle de Status (Kanban)</h2>
                            <p className="text-gray-500 mt-1">Acompanhamento visual e gestão das propostas.</p>
                        </div>
                        <button 
                            onClick={() => { setEditingCard(null); setIsModalOpen(true); }}
                            className="bg-purple-600 hover:bg-purple-700 text-white px-5 py-2.5 rounded-xl font-semibold flex items-center gap-2 shadow-sm transition-colors"
                        >
                            <i className="ph ph-plus text-[20px]"></i>
                            Nova Proposta
                        </button>
                    </div>

                    <div className="flex-1 overflow-x-auto pb-4 custom-scrollbar">
                        <div className="flex gap-4 min-w-max h-full">
                            {KANBAN_COLS.map(col => (
                                <div 
                                    key={col} 
                                    className="w-80 bg-gray-50/80 rounded-2xl p-4 border border-gray-200 flex flex-col"
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, col)}
                                >
                                    <h3 className="font-bold text-gray-700 mb-4 flex items-center justify-between">
                                        {col}
                                        <span className="bg-gray-200 text-gray-600 text-xs py-1 px-2 rounded-full">
                                            {cards.filter(c => c.status === col).length}
                                        </span>
                                    </h3>
                                    <div className="flex-1 overflow-y-auto space-y-3 min-h-[100px]">
                                        {cards.filter(c => c.status === col).map(card => (
                                            <div 
                                                key={card.id} 
                                                draggable
                                                onDragStart={(e) => handleDragStart(e, card.id)}
                                                className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md cursor-grab active:cursor-grabbing transition-shadow relative overflow-hidden group"
                                            >
                                                <div className={`absolute top-0 left-0 w-1 h-full ${getSlaColor(card.sla)}`}></div>
                                                
                                                <div className="flex justify-between items-start mb-2 relative">
                                                    <span className="font-bold text-gray-800 text-sm group-hover:text-purple-600 transition-colors pr-4 w-[75%] truncate">
                                                        {card.name}
                                                    </span>
                                                    
                                                    <div className="relative h-6 flex items-start justify-end flex-1">
                                                        <span className="absolute text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded font-semibold group-hover:opacity-0 transition-opacity">

        const FinalScreen = () => (
            <div className="min-h-[80vh] flex flex-col justify-center items-center text-center animate-fade-in max-w-4xl mx-auto">
                <div className="bg-gradient-to-br from-purple-50 to-gray-100 w-full p-12 rounded-3xl border border-purple-100 shadow-lg relative overflow-hidden">
                    
                    <div className="absolute top-[-50px] right-[-50px] w-64 h-64 bg-purple-500/10 rounded-full blur-3xl"></div>
                    <div className="absolute bottom-[-50px] left-[-50px] w-64 h-64 bg-black/5 rounded-full blur-3xl"></div>

                    <i className="ph ph-shield-check text-[96px] text-black mx-auto mb-8 drop-shadow-md"></i>
                    <h2 className="text-4xl font-extrabold text-purple-900 mb-4">
                        Excelência Operacional
                    </h2>
                    <p className="text-xl text-purple-800/80 mb-12 max-w-2xl mx-auto">
                        Nosso objetivo é garantir uma implantação ágil, segura e padronizada, proporcionando a melhor experiência para nossos clientes.
                    </p>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
                        {[
                            { label: 'Tempo Médio', val: '4.2 Dias' },
                            { label: 'SLA Atendido', val: '94%' },
                            { label: 'Pendências', val: '< 5%' },
                            { label: 'Implantadas', val: '800+' },
                        ].map((k, i) => (
                            <div key={i} className="bg-white/80 backdrop-blur-sm py-6 px-4 rounded-2xl border border-white shadow-sm">
                                <div className="text-2xl font-bold text-purple-700">{k.val}</div>
                                <div className="text-sm font-medium text-gray-500 mt-1">{k.label}</div>
                            </div>
                        ))}
                    </div>

                    <p className="text-sm text-gray-400 font-medium tracking-wide uppercase">
                        Foco no processo • Foco no cliente
                    </p>
                </div>
            </div>
        );

        const App = () => {
            const [currentScreen, setCurrentScreen] = useState('cover');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            const [cards, setCards] = useState(() => {
                const savedCards = localStorage.getItem('kanbanCards');
                if (savedCards) {
                    try { return JSON.parse(savedCards); } 
                    catch (e) { return []; }
                }
                return []; 
            }); 

            useEffect(() => {
                localStorage.setItem('kanbanCards', JSON.stringify(cards));
            }, [cards]);

            const handleNav = (screenId) => {
                setCurrentScreen(screenId);
                setMobileMenuOpen(false);
            };

            if (currentScreen === 'cover') {
                return <CoverScreen onStart={() => setCurrentScreen('menu')} />;
            }

            return (
                <div className="min-h-screen flex font-sans text-gray-900">
                    
                    <div className="lg:hidden fixed top-0 left-0 right-0 h-16 bg-white shadow-sm flex items-center justify-between px-4 z-50">
                        <div className="flex items-center gap-2 text-purple-800 font-bold text-lg">
                            <i className="ph ph-activity text-[24px]"></i>
                            Guia Implantação
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 text-gray-600">
                            <i className={`ph ${mobileMenuOpen ? 'ph-x' : 'ph-list'} text-[24px]`}></i>
                        </button>
                    </div>

                    <aside className={`fixed lg:static top-16 lg:top-0 left-0 h-[calc(100vh-4rem)] lg:h-screen w-72 bg-white border-r border-gray-200 z-40 transition-transform duration-300 ease-in-out flex flex-col ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="hidden lg:flex items-center gap-3 p-6 border-b border-gray-100 text-purple-800">
                            <div className="bg-black p-2 rounded-xl text-white flex items-center justify-center">
                                <i className="ph ph-activity text-[24px]"></i>
                            </div>
                            <div>
                                <h1 className="font-extrabold text-lg leading-tight">Guia Implantação</h1>
                                <p className="text-xs text-purple-600/70 font-semibold">Operacional Saúde</p>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                            {MENU_ITEMS.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => handleNav(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left font-medium
                                        ${currentScreen === item.id 
                                            ? 'bg-purple-50 text-purple-700 shadow-sm border border-purple-100' 
                                            : 'text-gray-600 hover:bg-gray-50 hover:text-purple-600'}`}
                                >
                                    <i className={`ph ${item.icon} text-[20px] ${currentScreen === item.id ? 'text-purple-600' : 'text-gray-400'}`}></i>
                                    {item.label}
                                </button>
                            ))}
                        </div>
                        
                        <div className="p-6 border-t border-gray-100 text-xs text-gray-400 text-center">
                            Versão 1.0.3 (HTML) • Atualizado 2026
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden pt-16 lg:pt-0 relative bg-slate-50">
                        <header className="hidden lg:flex items-center justify-between px-10 py-5 bg-white/80 backdrop-blur-md border-b border-gray-200/50 sticky top-0 z-30">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                {MENU_ITEMS.find(i => i.id === currentScreen)?.icon && 
                                    <i className={`ph ${MENU_ITEMS.find(i => i.id === currentScreen).icon} text-[24px] text-purple-600`}></i>}
                                {MENU_ITEMS.find(i => i.id === currentScreen)?.label}
                            </h2>
                            <div className="flex items-center gap-4">
                                <span className="flex items-center gap-2 text-sm font-medium bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full border border-emerald-100 shadow-sm">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    Sistema Operacional Online
                                </span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
                            {currentScreen === 'menu' && <MenuScreen setScreen={handleNav} />}
                            {currentScreen === 'pme' && <FlowTemplate title="Fluxo Plano PME" icon="ph-buildings" flowData={FLOW_PME} />}
                            {currentScreen === 'adesao' && <FlowTemplate title="Fluxo Plano Adesão" icon="ph-users" flowData={FLOW_ADESAO} />}
                            {currentScreen === 'individual' && <FlowTemplate title="Fluxo Plano Individual" icon="ph-user" flowData={FLOW_INDIVIDUAL} />}
                            {currentScreen === 'checklist' && <ChecklistScreen />}
                            {currentScreen === 'kanban' && <KanbanScreen cards={cards} setCards={setCards} />}
                            {currentScreen === 'dashboard' && <DashboardScreen cards={cards} setCards={setCards} />}
                            {currentScreen === 'alertas' && <AlertsScreen />}
                            {currentScreen === 'mensagens' && <MessagesScreen />}
                            {currentScreen === 'faq' && <FAQScreen />}
                            {currentScreen === 'final' && <FinalScreen />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
