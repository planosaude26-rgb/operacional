        const copyToClipboard = (text, setCopiedId, id) => {
            const fallbackCopy = (textToCopy) => {
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedId(id);
                    setTimeout(() => setCopiedId(null), 2000);
                } catch (err) {
                    console.error('Fallback copy failed', err);
                }
                textArea.remove();
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => {
                        setCopiedId(id);
                        setTimeout(() => setCopiedId(null), 2000);
                    })
                    .catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        };

                setDraggedCardId(id);
                e.dataTransfer.effectAllowed = "move";
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = (e, newStatus) => {
                e.preventDefault();
                if (draggedCardId !== null) {
                    setCards(prevCards => 
                        prevCards.map(card => 
                            card.id === draggedCardId ? { ...card, status: newStatus } : card
                        )
                    );
                    setDraggedCardId(null);
                }

            const handleDeleteCard = (id) => {
                setCards(prevCards => prevCards.filter(card => card.id !== id));
            };

                setEditingCard(card);
                setIsModalOpen(true);
            };

                e.preventDefault();
                const formData = new FormData(e.target);
                const cardData = {
                    name: formData.get('name'),
                    op: formData.get('op'),
                    type: formData.get('type'),
                    resp: formData.get('resp'),
                };

                if (editingCard) {
                    setCards(prevCards => prevCards.map(card => 
                        card.id === editingCard.id ? { ...card, ...cardData } : card
                    ));
                } else {
                    const newCard = {
                        id: Date.now(),
                        ...cardData,
                        date: new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' }),
                        sla: 'green',
                        status: 'Recebida'
                    };
                    setCards([...cards, newCard]);
                }
                
                setIsModalOpen(false);
                setEditingCard(null);
            };

            const getSlaColor = (color) => {
                switch(color) {
                    case 'green': return 'bg-emerald-500';
                    case 'yellow': return 'bg-amber-400';
                    case 'red': return 'bg-rose-500';
                    default: return 'bg-gray-400';
                }
            };

                <div className="h-[80vh] flex flex-col animate-fade-in relative">
                    <div className="mb-6 flex justify-between items-end">

                        </div>

                            onClick={() => { setEditingCard(null); setIsModalOpen(true); }}

                                    className="w-80 bg-gray-50/80 rounded-2xl p-4 border border-gray-200 flex flex-col"
                                    onDragOver={handleDragOver}
                                    onDrop={(e) => handleDrop(e, col)}
                                >
                                    <h3 className="font-bold text-gray-700 mb-4 flex items-center justify-between">
                                        {col}
                                        <span className="bg-gray-200 text-gray-600 text-xs py-1 px-2 rounded-full">
                                            {cards.filter(c => c.status === col).length}
                                        </span>
                                    </h3>
                                    <div className="flex-1 overflow-y-auto space-y-3 min-h-[100px]">
                                        {cards.filter(c => c.status === col).map(card => (
                                            <div 
                                                key={card.id} 
                                                draggable
                                                onDragStart={(e) => handleDragStart(e, card.id)}
                                                className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md cursor-grab active:cursor-grabbing transition-shadow relative overflow-hidden group"
                                            >
                                                <div className={`absolute top-0 left-0 w-1 h-full ${getSlaColor(card.sla)}`}></div>
                                                
                                                <div className="flex justify-between items-start mb-2 relative">
                                                    <span className="font-bold text-gray-800 text-sm group-hover:text-purple-600 transition-colors pr-4 w-[75%] truncate">
                                                        {card.name}
                                                    </span>
                                                    
                                                    <div className="relative h-6 flex items-start justify-end flex-1">
                                                        <span className="absolute text-xs bg-purple-50 text-purple-700 px-2 py-0.5 rounded font-semibold group-hover:opacity-0 transition-opacity">
                                                            {card.type}
                                                        </span>

                                                                onMouseDown={(e) => e.stopPropagation()} 
                                                                onClick={(e) => { e.stopPropagation(); handleEditClick(card); }}

                                                                title="Editar"
                                                            >
                                                                <i className="ph ph-pencil-simple text-[14px]"></i>
                                                            </button>
                                                            <button 
                                                                onMouseDown={(e) => e.stopPropagation()} 
                                                                onClick={(e) => { e.stopPropagation(); handleDeleteCard(card.id); }}
                                                                className="p-1 text-gray-400 hover:text-rose-600 hover:bg-rose-50 rounded transition-colors"
                                                                title="Excluir"
                                                            >
                                                                <i className="ph ph-trash text-[14px]"></i>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="text-xs text-gray-500 mb-3">{card.op}</div>
                                                <div className="flex justify-between items-center text-xs text-gray-400 mt-2 pt-2 border-t border-gray-50">
                                                    <span className="flex items-center gap-1"><i className="ph ph-user text-[12px]"></i> {card.resp}</span>
                                                    <span className="flex items-center gap-1"><i className="ph ph-clock text-[12px]"></i> {card.date}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl animate-fade-in-up">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold text-gray-800">
                                        {editingCard ? 'Editar Proposta' : 'Cadastrar Nova Proposta'}
                                    </h3>
                                    <button 
                                        onClick={() => { setIsModalOpen(false); setEditingCard(null); }} 
                                        className="text-gray-400 hover:text-gray-600"
                                    >
                                        <i className="ph ph-x text-[24px]"></i>
                                    </button>
                                </div>
                                
                                <form key={editingCard ? editingCard.id : 'new'} onSubmit={handleSaveCard} className="space-y-4">

                                        <label className="block text-sm font-medium text-gray-700 mb-1">Nome do Cliente / Empresa</label>
                                        <input required name="name" type="text" defaultValue={editingCard?.name} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Ex: Acme Corp" />

                                    </div>

                                                <option value="Adesão">Adesão</option>
                                                <option value="Individual">Individual</option>

                                            <input required name="resp" type="text" defaultValue={editingCard?.resp} className="w-full border border-gray-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500" placeholder="Nome" />

                                    </div>

                                    <div className="mt-8 flex gap-3 pt-4 border-t border-gray-100">

                                            className="flex-1 px-4 py-2.5 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl font-medium transition-colors"
                                        >
                                            Cancelar
                                        </button>
                                        <button type="submit" className="flex-1 px-4 py-2.5 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-medium transition-colors shadow-sm">
                                            {editingCard ? 'Salvar Alterações' : 'Salvar Proposta'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const DashboardScreen = ({ cards, setCards }) => {
            const totalPropostas = cards.length;
            const implantadas = cards.filter(c => c.status === 'Implantada').length;
            const pendencias = cards.filter(c => c.status === 'Pendência').length;
            const noPrazo = cards.filter(c => c.sla === 'green').length;
            const slaPercent = totalPropostas === 0 ? 0 : Math.round((noPrazo / totalPropostas) * 100);

            const getStatusPercent = (statusName) => {
                if (totalPropostas === 0) return 0;
                const count = cards.filter(c => c.status === statusName).length;
                return Math.round((count / totalPropostas) * 100);
            };

            return (
                <div className="animate-fade-in">
                    <div className="flex justify-between items-center mb-8">
                        <h2 className="text-3xl font-bold text-gray-800">Dashboard Executivo</h2>
                        {totalPropostas > 0 && (
                            <button 
                                onClick={() => { if(window.confirm('Tem certeza que deseja apagar todas as propostas?')) setCards([]); }}
                                className="flex items-center gap-2 text-sm text-rose-600 bg-rose-50 hover:bg-rose-100 px-4 py-2.5 rounded-xl font-semibold transition-colors border border-rose-100 shadow-sm"
                            >
                                <i className="ph ph-trash text-[16px]"></i>
                                Zerar Contagem
                            </button>
                        )}
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        {[
                            { title: 'Total de Propostas', value: totalPropostas, sub: 'Geral', icon: 'ph-file-text', color: 'text-purple-600', bg: 'bg-purple-100' },
                            { title: 'Implantadas', value: implantadas, sub: 'Concluídas', icon: 'ph-check-circle', color: 'text-emerald-600', bg: 'bg-emerald-100' },
                            { title: 'Pendências Doc.', value: pendencias, sub: 'Ação necessária', icon: 'ph-warning-circle', color: 'text-rose-600', bg: 'bg-rose-100' },
                            { title: 'Tempo Médio', value: totalPropostas > 0 ? '4.2' : '0', sub: 'Dias úteis', icon: 'ph-activity', color: 'text-gray-600', bg: 'bg-gray-200' },
                        ].map((kpi, i) => (
                            <div key={i} className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-5">
                                <div className={`w-14 h-14 ${kpi.bg} ${kpi.color} rounded-xl flex items-center justify-center shrink-0`}>
                                    <i className={`ph ${kpi.icon} text-[28px]`}></i>
                                </div>
                                <div>

                                    <h4 className="text-3xl font-extrabold text-gray-800">{kpi.value}</h4>
                                    <p className="text-xs text-gray-400 mt-1">{kpi.sub}</p>
                                </div>
                            </div>

                                {[
                                    { label: 'Em Análise Operadora', val: getStatusPercent('Em Análise'), color: 'bg-purple-500' },
                                    { label: 'Aguardando Assinatura', val: getStatusPercent('Assinatura'), color: 'bg-amber-400' },
                                    { label: 'Em Cadastro', val: getStatusPercent('Cadastro'), color: 'bg-gray-700' },
                                    { label: 'Checklist Inicial', val: getStatusPercent('Check List'), color: 'bg-gray-400' },
                                ].map(item => (
                                    <div key={item.label}>
                                        <div className="flex justify-between text-sm mb-1">
                                            <span className="text-gray-600">{item.label}</span>
                                            <span className="font-bold text-gray-800">{item.val}%</span>
                                        </div>
                                        <div className="w-full bg-gray-100 rounded-full h-2.5">
                                            <div className={`${item.color} h-2.5 rounded-full transition-all duration-500`} style={{ width: `${item.val}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-center items-center text-center">
                            <div 
                                className="relative w-48 h-48 rounded-full flex items-center justify-center mb-4 transition-all duration-500 shadow-[inset_0_0_20px_rgba(0,0,0,0.05)]"
                                style={{ background: `conic-gradient(#10b981 ${slaPercent}%, #ecfdf5 0)` }}
                            >
                                <div className="w-40 h-40 bg-white rounded-full flex items-center justify-center flex-col shadow-sm">
                                    <span className="text-4xl font-extrabold text-gray-800">{slaPercent}%</span>
                                    <p className="text-sm text-gray-500 mt-1">SLA no Prazo</p>
                                </div>
                            </div>
                            <p className="text-gray-600 max-w-sm mt-4">Nossa meta é manter o SLA acima de 90%. Foque na resolução de pendências ativas.</p>
                        </div>
                    </div>
                </div>
            );

        const AlertsScreen = () => {
            const [copiedId, setCopiedId] = useState(null);

            const alerts = [
                { id: 1, title: 'Checklist Incompleto', desc: 'Nunca cadastrar proposta no sistema da operadora sem o checklist 100% validado.', icon: 'ph-check-square' },
                { id: 2, title: 'Contatos Corretos', desc: 'Sempre conferir minuciosamente E-mail e Telefone do titular para evitar devoluções.', icon: 'ph-user' },
                { id: 3, title: 'Carta de Permanência', desc: 'Solicitar Carta de Permanência obrigatória sempre que o cliente declarar plano anterior.', icon: 'ph-file-text' },
                { id: 4, title: 'Vínculo de Dependentes', desc: 'Conferir com rigor o documento que comprova o vínculo de todos os dependentes incluídos.', icon: 'ph-users' },
                { id: 5, title: 'Validação de Assinaturas', desc: 'Validar a assinatura (física ou digital) antes de realizar o upload final na plataforma.', icon: 'ph-file-text' },
                { id: 6, title: 'Pagamento de Boleto', desc: 'Conferir o pagamento do primeiro boleto antes de confirmar a implantação (PME e Individual).', icon: 'ph-warning-circle' },
            ];

            const handleCopy = (alerta) => {
                const textToCopy = `[ALERTA OPERACIONAL]: ${alerta.title} - ${alerta.desc}`;
                copyToClipboard(textToCopy, setCopiedId, alerta.id);
            };

            return (
                <div className="max-w-5xl mx-auto animate-fade-in">
                    <div className="flex items-center gap-4 mb-8 pb-6 border-b border-gray-200">
                        <div className="p-3 bg-rose-100 text-rose-600 rounded-xl">
                            <i className="ph ph-warning-circle text-[28px]"></i>
                        </div>
                        <div>
                            <h2 className="text-3xl font-bold text-gray-800">Alertas Importantes</h2>
                            <p className="text-gray-500 mt-1">Atenção redobrada a estes pontos para evitar erros e atrasos na implantação.</p>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-2 gap-6">
                        {alerts.map((al) => (
                            <div key={al.id} className="bg-white border-l-4 border-rose-500 p-6 rounded-xl shadow-sm hover:shadow-md transition-shadow group relative">
                                <button 
                                    onClick={() => handleCopy(al)}
                                    className={`absolute top-4 right-4 p-2 rounded-lg transition-colors flex items-center gap-1 text-xs font-semibold
                                        ${copiedId === al.id ? 'bg-emerald-100 text-emerald-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200 hover:text-gray-700'}`}
                                    title="Copiar Alerta"
                                >
                                    <i className={`ph ${copiedId === al.id ? 'ph-check-circle text-[16px]' : 'ph-copy text-[16px]'}`}></i>
                                    {copiedId === al.id ? 'Copiado!' : 'Copiar'}

                                        <i className={`ph ${al.icon} text-[24px]`}></i>
                                    </div>
                                    <div className="pr-16">
                                        <h3 className="font-bold text-gray-800 text-lg mb-2">{al.title}</h3>
                                        <p className="text-gray-600 leading-relaxed">{al.desc}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const MessagesScreen = () => {
            const [copiedId, setCopiedId] = useState(null);
            const [activeCategory, setActiveCategory] = useState('status');

            const initialMessages = [
                // STATUS KANBAN
                { id: 'm1', cat: 'status', title: 'Aguardando Checklist Inicial', text: 'Olá, [Nome do Assessor]! Recebemos a proposta de [Nome do Cliente]. Por favor, envie os documentos pendentes do checklist inicial para darmos andamento ao cadastro.' },
                { id: 'm2', cat: 'status', title: 'Em Análise na Operadora', text: 'Olá! A proposta de [Nome do Cliente] foi cadastrada e enviada para análise da operadora. O prazo padrão é de até 20 dias úteis. Avisaremos assim que tivermos o retorno!' },
                { id: 'm3', cat: 'status', title: 'Implantação Concluída', text: 'Excelente notícia! A implantação do plano de [Nome do Cliente] foi concluída com sucesso. O plano já encontra-se ativo.' },
                { id: 'm7', cat: 'status', title: 'Aguardando Assinatura do Cliente', text: 'Olá! O cadastro da proposta de [Nome do Cliente] foi finalizado. Para enviarmos para a análise da operadora, precisamos que o cliente realize a assinatura digital. Pode reforçar com ele?' },
                { id: 'm8', cat: 'status', title: 'Aguardando Pagamento do Boleto', text: 'A proposta de [Nome do Cliente] foi aprovada! A implantação final está aguardando apenas a confirmação de pagamento do primeiro boleto bancário.' },
                { id: 'm12', cat: 'status', title: 'Documentos Recepcionados', text: 'Olá! Confirmamos a recepção dos documentos da proposta de [Nome do Cliente]. Iniciamos a conferência do checklist e o prazo de SLA de cadastro começou a contar.' },
                { id: 'm13', cat: 'status', title: 'Boleto Gerado/Enviado', text: 'Olá! O primeiro boleto da proposta de [Nome do Cliente] foi gerado e enviado ao e-mail cadastrado. Lembre o cliente de efetuar o pagamento até o vencimento.' },
                { id: 'm14', cat: 'status', title: 'Portabilidade Aprovada', text: 'Ótima notícia! A solicitação de portabilidade de carências de [Nome do Cliente] foi aprovada pela operadora. Seguiremos com o fluxo de implantação.' },
                
                // PENDÊNCIAS / ALERTAS
                { id: 'm4', cat: 'alerta', title: 'Pendência: Carta de Permanência', text: 'Aviso de Pendência: Identificamos que [Nome do Cliente] possui plano anterior. Para solicitar o aproveitamento de carências, é obrigatório o envio da Carta de Permanência atualizada.' },
                { id: 'm5', cat: 'alerta', title: 'Pendência: Comprovante de Vínculo', text: 'Aviso de Pendência: O documento de vínculo enviado para o dependente [Nome do Dependente] não é válido. Por favor, enviar certidão de nascimento ou casamento atualizada.' },
                { id: 'm6', cat: 'alerta', title: 'Exigência da Operadora', text: 'Atenção! A operadora apontou a seguinte exigência durante a análise: [Descrever a exigência, ex: entrevista médica]. O prazo de implantação fica pausado até a regularização.' },
                { id: 'm9', cat: 'alerta', title: 'Documento de Vínculo Inválido (PME/Adesão)', text: 'Aviso de Pendência: O comprovante de vínculo do funcionário/associado [Nome do Titular] com a empresa/entidade está ilegível ou desatualizado. Favor enviar cópia atualizada (eSocial, FGTS ou holerite recente).' },
                { id: 'm10', cat: 'alerta', title: 'Problema na Assinatura', text: 'Aviso de Pendência: A assinatura no contrato/Dps de [Nome do Cliente] apresentou divergência em relação ao documento pessoal. É necessário coletar uma nova assinatura conforme o documento (ou digital).' },
                { id: 'm11', cat: 'alerta', title: 'Falta de Selfie (Biometria Facial)', text: 'Aviso de Pendência: A operadora exige a "Selfie" do titular segurando o documento de identificação ao lado do rosto. Sem este arquivo, não podemos prosseguir com o cadastro de [Nome do Cliente].' },
                { id: 'm15', cat: 'alerta', title: 'Divergência na Declaração de Saúde', text: 'Aviso de Pendência: A operadora identificou uma divergência na Declaração de Saúde de [Nome do Cliente]. Será necessário agendar uma Entrevista Médica Qualificada. O SLA ficará pausado.' },
                { id: 'm16', cat: 'alerta', title: 'CNPJ Irregular ou Inativo', text: 'Aviso de Pendência (PME): Constatamos que o CNPJ da empresa [Nome da Empresa] encontra-se irregular/baixado na Receita Federal. Regularize a situação para seguirmos com o cadastro.' },
                { id: 'm17', cat: 'alerta', title: 'Comprovante de Endereço Inválido', text: 'Aviso de Pendência: O comprovante de residência enviado em nome de [Nome do Cliente] possui mais de 90 dias ou não está em nome do titular/cônjuge. Favor enviar um atualizado.' },
                { id: 'm18', cat: 'alerta', title: 'Regra de Idade de Aceitação', text: 'Aviso de Pendência: O beneficiário [Nome do Beneficiário] ultrapassa a idade limite de aceitação da operadora para este tipo de contratação. Por favor, verificar as regras de Idade.' }
            ];

            const [messagesState, setMessagesState] = useState(initialMessages);

            const handleTextChange = (id, newText) => {
                setMessagesState(prev => prev.map(m => m.id === id ? { ...m, text: newText } : m));
            };

            const handleCopyMessage = (msg) => {
                copyToClipboard(msg.text, setCopiedId, msg.id);
            };

            const filteredMessages = messagesState.filter(m => m.cat === activeCategory);

            return (
                <div className="max-w-5xl mx-auto animate-fade-in">
                    <div className="flex items-center gap-4 mb-8 pb-6 border-b border-gray-200">
                        <div className="p-3 bg-purple-100 text-purple-700 rounded-xl flex items-center justify-center">
                            <i className="ph ph-chats text-[28px]"></i>
                        </div>
                        <div>
                            <h2 className="text-3xl font-bold text-gray-800">Mensagens Prontas</h2>
                            <p className="text-gray-500 mt-1">Edite os campos e copie as mensagens padronizadas para enviar aos assessores.</p>
                        </div>
                    </div>

                    <div className="flex space-x-2 mb-8 bg-gray-100 p-1.5 rounded-2xl w-fit">
                        <button
                            onClick={() => setActiveCategory('status')}
                            className={`flex items-center gap-2 px-6 py-3 rounded-xl font-semibold transition-all ${activeCategory === 'status' ? 'bg-white text-purple-700 shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200/50'}`}
                        >
                            <i className="ph ph-kanban text-[18px]"></i> Aviso de Status
                        </button>
                        <button
                            onClick={() => setActiveCategory('alerta')}
                            className={`flex items-center gap-2 px-6 py-3 rounded-xl font-semibold transition-all ${activeCategory === 'alerta' ? 'bg-white text-rose-600 shadow-sm' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200/50'}`}
                        >
                            <i className="ph ph-warning-circle text-[18px]"></i> Alertas / Pendências
                        </button>
                    </div>

                    <div className="grid md:grid-cols-2 gap-6">
                        {filteredMessages.map((msg) => (
                            <div key={msg.id} className="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden flex flex-col hover:border-purple-300 transition-colors">
                                <div className={`px-4 py-3 border-b border-gray-100 flex items-center gap-2 font-bold
                                    ${msg.cat === 'status' ? 'bg-purple-50 text-purple-800' : 'bg-rose-50 text-rose-800'}`}>
                                    <i className={`ph ${msg.cat === 'status' ? 'ph-info' : 'ph-warning'} text-[18px]`}></i>
                                    {msg.title}
                                </div>
                                <div className="p-4 flex-1 flex flex-col">
                                    <textarea 
                                        className="w-full h-32 p-3 text-sm text-gray-700 bg-gray-50 border border-gray-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white resize-none transition-all"
                                        value={msg.text}
                                        onChange={(e) => handleTextChange(msg.id, e.target.value)}
                                        title="Edite os dados entre colchetes antes de copiar."
                                    />
                                    <button 
                                        onClick={() => handleCopyMessage(msg)}
                                        className={`mt-4 w-full py-2.5 rounded-xl font-semibold flex items-center justify-center gap-2 transition-all
                                            ${copiedId === msg.id 
                                                ? 'bg-emerald-500 text-white shadow-md' 
                                                : 'bg-gray-900 text-white hover:bg-gray-800 hover:shadow-md'}`}
                                    >
                                        <i className={`ph ${copiedId === msg.id ? 'ph-check-circle' : 'ph-copy'} text-[18px]`}></i>
                                        {copiedId === msg.id ? 'Mensagem Copiada!' : 'Copiar Mensagem'}
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const FAQScreen = () => {
            const [openIdx, setOpenIdx] = useState(0);

            return (
                <div className="max-w-3xl mx-auto animate-fade-in">
                    <div className="text-center mb-10">
                        <h2 className="text-3xl font-bold text-gray-800 mb-4">Perguntas Frequentes</h2>
                        <p className="text-gray-500">Dúvidas operacionais comuns respondidas de forma rápida.</p>
                    </div>

                    <div className="space-y-4">
                        {FAQ_ITEMS.map((item, idx) => (
                            <div key={idx} className={`bg-white border rounded-2xl overflow-hidden transition-all duration-300 ${openIdx === idx ? 'border-purple-300 shadow-md' : 'border-gray-200 shadow-sm'}`}>
                                <button 
                                    onClick={() => setOpenIdx(openIdx === idx ? -1 : idx)}
                                    className="w-full text-left p-6 flex justify-between items-center focus:outline-none"
                                >
                                    <h3 className={`font-bold pr-8 ${openIdx === idx ? 'text-purple-700' : 'text-gray-700'}`}>
                                        {item.q}
                                    </h3>
                                    <i className={`ph ph-caret-down shrink-0 transition-transform duration-300 ${openIdx === idx ? 'rotate-180 text-purple-600' : 'text-gray-400'}`}></i>
                                </button>
                                <div className={`px-6 pb-6 text-gray-600 overflow-hidden transition-all duration-300 ${openIdx === idx ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0 pb-0'}`}>
                                    <div className="pt-2 border-t border-gray-100 mt-2">
                                        {item.a}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const FinalScreen = () => (
            <div className="min-h-[80vh] flex flex-col justify-center items-center text-center animate-fade-in max-w-4xl mx-auto">
                <div className="bg-gradient-to-br from-purple-50 to-gray-100 w-full p-12 rounded-3xl border border-purple-100 shadow-lg relative overflow-hidden">
                    
                    <div className="absolute top-[-50px] right-[-50px] w-64 h-64 bg-purple-500/10 rounded-full blur-3xl"></div>
                    <div className="absolute bottom-[-50px] left-[-50px] w-64 h-64 bg-black/5 rounded-full blur-3xl"></div>

                    <i className="ph ph-shield-check text-[96px] text-black mx-auto mb-8 drop-shadow-md"></i>
                    <h2 className="text-4xl font-extrabold text-purple-900 mb-4">
                        Excelência Operacional
                    </h2>
                    <p className="text-xl text-purple-800/80 mb-12 max-w-2xl mx-auto">
                        Nosso objetivo é garantir uma implantação ágil, segura e padronizada, proporcionando a melhor experiência para nossos clientes.
                    </p>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-10">
                        {[
                            { label: 'Tempo Médio', val: '4.2 Dias' },
                            { label: 'SLA Atendido', val: '94%' },
                            { label: 'Pendências', val: '< 5%' },
                            { label: 'Implantadas', val: '800+' },
                        ].map((k, i) => (
                            <div key={i} className="bg-white/80 backdrop-blur-sm py-6 px-4 rounded-2xl border border-white shadow-sm">
                                <div className="text-2xl font-bold text-purple-700">{k.val}</div>
                                <div className="text-sm font-medium text-gray-500 mt-1">{k.label}</div>
                            </div>
                        ))}
                    </div>

                    <p className="text-sm text-gray-400 font-medium tracking-wide uppercase">
                        Foco no processo • Foco no cliente
                    </p>
                </div>
            </div>
        );

        const App = () => {
            const [currentScreen, setCurrentScreen] = useState('cover');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            const [cards, setCards] = useState(() => {
                const savedCards = localStorage.getItem('kanbanCards');
                if (savedCards) {
                    try { return JSON.parse(savedCards); } 
                    catch (e) { return []; }
                }
                return []; 
            }); 

            useEffect(() => {
                localStorage.setItem('kanbanCards', JSON.stringify(cards));
            }, [cards]);

            const handleNav = (screenId) => {
                setCurrentScreen(screenId);
                setMobileMenuOpen(false);
            };

            if (currentScreen === 'cover') {
                return <CoverScreen onStart={() => setCurrentScreen('menu')} />;
            }

            return (
                <div className="min-h-screen flex font-sans text-gray-900">
                    
                    <div className="lg:hidden fixed top-0 left-0 right-0 h-16 bg-white shadow-sm flex items-center justify-between px-4 z-50">
                        <div className="flex items-center gap-2 text-purple-800 font-bold text-lg">
                            <i className="ph ph-activity text-[24px]"></i>
                            Guia Implantação
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="p-2 text-gray-600">
                            <i className={`ph ${mobileMenuOpen ? 'ph-x' : 'ph-list'} text-[24px]`}></i>
                        </button>
                    </div>

                    <aside className={`fixed lg:static top-16 lg:top-0 left-0 h-[calc(100vh-4rem)] lg:h-screen w-72 bg-white border-r border-gray-200 z-40 transition-transform duration-300 ease-in-out flex flex-col ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
                        <div className="hidden lg:flex items-center gap-3 p-6 border-b border-gray-100 text-purple-800">
                            <div className="bg-black p-2 rounded-xl text-white flex items-center justify-center">
                                <i className="ph ph-activity text-[24px]"></i>
                            </div>
                            <div>
                                <h1 className="font-extrabold text-lg leading-tight">Guia Implantação</h1>
                                <p className="text-xs text-purple-600/70 font-semibold">Operacional Saúde</p>
                            </div>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-6 px-4 space-y-1">
                            {MENU_ITEMS.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => handleNav(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left font-medium
                                        ${currentScreen === item.id 
                                            ? 'bg-purple-50 text-purple-700 shadow-sm border border-purple-100' 
                                            : 'text-gray-600 hover:bg-gray-50 hover:text-purple-600'}`}
                                >
                                    <i className={`ph ${item.icon} text-[20px] ${currentScreen === item.id ? 'text-purple-600' : 'text-gray-400'}`}></i>
                                    {item.label}
                                </button>
                            ))}
                        </div>
                        
                        <div className="p-6 border-t border-gray-100 text-xs text-gray-400 text-center">
                            Versão 1.0.4 (HTML) • Atualizado 2026
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-screen overflow-hidden pt-16 lg:pt-0 relative bg-slate-50">
                        <header className="hidden lg:flex items-center justify-between px-10 py-5 bg-white/80 backdrop-blur-md border-b border-gray-200/50 sticky top-0 z-30">
                            <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                                {MENU_ITEMS.find(i => i.id === currentScreen)?.icon && 
                                    <i className={`ph ${MENU_ITEMS.find(i => i.id === currentScreen).icon} text-[24px] text-purple-600`}></i>}
                                {MENU_ITEMS.find(i => i.id === currentScreen)?.label}
                            </h2>
                            <div className="flex items-center gap-4">
                                <span className="flex items-center gap-2 text-sm font-medium bg-emerald-50 text-emerald-700 px-3 py-1.5 rounded-full border border-emerald-100 shadow-sm">
                                    <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                                    Sistema Operacional Online
                                </span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-6 md:p-10 scroll-smooth">
                            {currentScreen === 'menu' && <MenuScreen setScreen={handleNav} />}
                            {currentScreen === 'pme' && <FlowTemplate title="Fluxo Plano PME" icon="ph-buildings" flowData={FLOW_PME} />}
                            {currentScreen === 'adesao' && <FlowTemplate title="Fluxo Plano Adesão" icon="ph-users" flowData={FLOW_ADESAO} />}
                            {currentScreen === 'individual' && <FlowTemplate title="Fluxo Plano Individual" icon="ph-user" flowData={FLOW_INDIVIDUAL} />}
                            {currentScreen === 'checklist' && <ChecklistScreen />}
                            {currentScreen === 'idades' && <AgesScreen />}
                            {currentScreen === 'kanban' && <KanbanScreen cards={cards} setCards={setCards} />}
                            {currentScreen === 'dashboard' && <DashboardScreen cards={cards} setCards={setCards} />}
                            {currentScreen === 'alertas' && <AlertsScreen />}
                            {currentScreen === 'mensagens' && <MessagesScreen />}
                            {currentScreen === 'faq' && <FAQScreen />}
                            {currentScreen === 'final' && <FinalScreen />}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
